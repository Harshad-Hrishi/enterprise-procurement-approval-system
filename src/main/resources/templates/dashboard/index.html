<!DOCTYPE html>

<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout/master}">

<head>

    <title>Dashboard</title>

</head>

<body>

<section layout:fragment="content">

    <div class="container-fluid mt-4">

        <h2 class="mb-4">

            Dashboard

        </h2>

        <div class="row">

            <div class="col-md-3">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h5>Total Users</h5>

                        <h2>1</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h5>Departments</h5>

                        <h2>5</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h5>Pending Approvals</h5>

                        <h2>0</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h5>Purchase Requests</h5>

                        <h2>0</h2>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

</body>

</html>
