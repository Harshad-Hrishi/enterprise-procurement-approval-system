<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EPAS Login</title>
</head>
<body>

<h2>Enterprise Procurement & Approval System</h2>

<form th:action="@{/login}" method="post">

    <input
            type="email"
            name="username"
            placeholder="Email">

    <br><br>

    <input
            type="password"
            name="password"
            placeholder="Password">

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
